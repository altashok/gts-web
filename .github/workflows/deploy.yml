name: Deploy Next.js Application

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Next.js app
        run: npm run build

      - name: Prepare SSH key
        shell: bash
        env:
          VPS_KEY: ${{ secrets.VPS_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${VPS_KEY:-}" ]; then
            echo "Missing secret: VPS_KEY"
            exit 1
          fi

          mkdir -p ~/.ssh
          # Support both real newlines and literal '\n' sequences (common when pasting into secrets).
          # Also support storing a base64-encoded private key in the secret.
          if printf '%s' "$VPS_KEY" | grep -q "BEGIN .*PRIVATE KEY"; then
            printf '%s' "$VPS_KEY" | sed 's/\r//g; s/\\\\n/\n/g' > ~/.ssh/id_rsa
          else
            if printf '%s' "$VPS_KEY" | tr -d '\r\n\t ' | base64 -d > ~/.ssh/id_rsa 2>/dev/null; then
              :
            else
              echo "VPS_KEY is not a recognizable private key and is not valid base64."
              echo "Expected header like: -----BEGIN OPENSSH PRIVATE KEY-----"
              exit 1
            fi
          fi
          chmod 600 ~/.ssh/id_rsa

          # Validate that the key parses (does not print the private key).
          echo "Key header: $(head -n 1 ~/.ssh/id_rsa | tr -d '\r')"
          echo "Key lines: $(wc -l < ~/.ssh/id_rsa | tr -d ' ')"
          if ! ssh-keygen -y -f ~/.ssh/id_rsa >/dev/null; then
            echo "Failed to parse private key at ~/.ssh/id_rsa."
            echo "Common causes: wrong format (e.g. PuTTY .ppk), truncated key, or encrypted key (passphrase)."
            exit 1
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ vars.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          key: ${{ secrets.VPS_KEY }}
          port: ${{ vars.VPS_PORT }}
          script: |
            powershell -NoProfile -Command "Set-Location 'C:\\website-source\\gts-web'; git pull origin main; npm install; npm run build; pm2 restart all"
